{% extends "main.html" %}

{% block content %}
<style>
    .map_navigation {
        width: 65px;
        padding: 4px;
        cursor: pointer;
        text-align: center;
    }

    .map_navigation img {
        width: 32px;
        height: auto;
    }

    #map_wrap {
        position: relative;
        overflow: hidden;
    }

    #map_coord_y_wrap {
        position: absolute;
        left: 0;
        top: 0;
        width: 42px;
        min-height: 520px;
        padding-top: 20px;
        box-sizing: border-box;
        color: #f8f0b6;
        font-size: 0.8rem;
    }

    #map_coord_x_wrap {
        position: absolute;
        left: 42px;
        bottom: 0;
        right: 0;
        height: 24px;
        box-sizing: border-box;
        padding-left: 10px;
        color: #f8f0b6;
        font-size: 0.8rem;
        white-space: nowrap;
        overflow-x: auto;
    }

    #map_coord_x, #map_coord_y {
        position: relative;
    }

    #map_coord_y .coord-label,
    #map_coord_x .coord-label {
        display: block;
        padding: 0 4px;
    }

    #map_coord_y .coord-label {
        height: 38px;
        line-height: 38px;
    }

    #map_coord_x .coord-label {
        display: inline-block;
        width: 53px;
        text-align: center;
    }

    #map_image {
        margin-left: 42px;
        margin-bottom: 24px;
        overflow: auto;
        max-height: 540px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(0,0,0,0.14);
    }

    #grid {
        border-collapse: collapse;
        margin: 0;
        width: auto;
    }

    #grid td {
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(14,16,20,0.85);
        width: 53px;
        height: 38px;
        text-align: center;
        color: #f8f0b6;
        font-size: 0.75rem;
        transition: background 0.15s ease, box-shadow 0.15s ease;
        padding: 0;
    }

    #grid td:hover {
        background: rgba(255,255,255,0.14);
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18);
    }

    #grid td.owner { background: rgba(240,200,0,0.45); }
    #grid td.tribe { background: rgba(0,0,244,0.45); }
    #grid td.enemy { background: rgba(244,0,0,0.35); }
    #grid td.barbarian { background: rgba(150,150,150,0.55); }
</style>
<div class="row">
    <div class="col-lg-9">
        <div class="containerBorder narrow" id="map_whole">
            <div id="map_wrap">
                <div id="map_coord_y_wrap"><div id="map_coord_y"></div></div>
                <div id="map_image">
                    <div id="map_main">
                        <table id="grid"></table>
                    </div>
                </div>
                <div id="map_coord_x_wrap"><div id="map_coord_x"></div></div>
            </div>
        </div>
    </div>

    <div class="col-lg-3">
        <div class="card">
            <div class="card-header panel-decor">Szczegóły</div>
            <div class="card-body">
                <h5 id="v_name" class="gold-underline"></h5>
                <p id="v_data" class="muted"></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    var map_data = {{map | safe}};
    var grid = document.getElementById('grid');

    var TWMap = {
        scrollBlock: function(dx, dy) {
            var x = map_data.center_x !== null ? map_data.center_x : Math.floor((map_data.min_x + map_data.max_x) / 2);
            var y = map_data.center_y !== null ? map_data.center_y : Math.floor((map_data.min_y + map_data.max_y) / 2);
            x += dx;
            y += dy;
            window.location.href = '/map?x=' + x + '&y=' + y;
            return false;
        },
        focusUserSpecified: function(x, y) {
            if (typeof x !== 'number' || typeof y !== 'number' || isNaN(x) || isNaN(y)) {
                return;
            }
            window.location.href = '/map?x=' + x + '&y=' + y;
        }
    };

    function generateGrid(x, y, data) {
        grid.innerHTML = "";
        grid.style.width = (x * 53) + 'px';
        grid.style.tableLayout = 'fixed';
        for (var rowIndex = 0; rowIndex < y; rowIndex++) {
            var row = grid.insertRow(rowIndex);
            for (var colIndex = 0; colIndex < x; colIndex++) {
                var cell = row.insertCell(colIndex);
                cell.style.width = '53px';
                cell.style.height = '38px';

                if (colIndex in data.grid && rowIndex in data.grid[colIndex] && data.grid[colIndex][rowIndex]) {
                    var village = data.grid[colIndex][rowIndex];
                    cell.onclick = function() { clickCell(this); };
                    cell.onmouseover = function() { clickCell(this); };
                    if (village.owner != "0") {
                        cell.setAttribute("village", JSON.stringify(village));
                        if (data.extra && village.owner == data.extra.owner) {
                            cell.className = "owner";
                        } else if (data.extra && data.extra.tribe != "0" && data.extra.tribe == village.tribe) {
                            cell.className = "tribe";
                        } else {
                            cell.className = "enemy";
                        }
                    } else {
                        cell.className = "barbarian";
                    }
                }
            }
        }
    }

    function clickCell(cell) {
        var village_data = $(cell).attr("village");
        if (!village_data) return;
        var data = JSON.parse(village_data);
        $('#v_name').text(data.name);

        var output = '';
        $.each(data, function(k, v) {
            if (jQuery.type(v) !== "object") {
                output += '<strong>' + k + '</strong> ' + v + '<br />';
            }
        });
        $('#v_data').html(output);
    }

    function hasMapContent(data) {
        if (!data || !data.grid) {
            return false;
        }
        for (var x in data.grid) {
            if (!data.grid.hasOwnProperty(x)) continue;
            var row = data.grid[x];
            if (!row) continue;
            for (var y in row) {
                if (!row.hasOwnProperty(y)) continue;
                if (row[y]) return true;
            }
        }
        return false;
    }

    function fillAxisLabels(data) {
        var xLabels = $('#map_coord_x');
        var yLabels = $('#map_coord_y');
        xLabels.empty();
        yLabels.empty();

        if (!data || typeof data.min_x === 'undefined' || typeof data.min_y === 'undefined') {
            return;
        }

        for (var x = data.min_x; x <= data.max_x; x++) {
            xLabels.append('<div class="coord-label">' + x + '</div>');
        }
        for (var y = data.min_y; y <= data.max_y; y++) {
            yLabels.append('<div class="coord-label">' + y + '</div>');
        }
    }

    function initializeMap() {
        if (!hasMapContent(map_data)) {
            $('#grid').html('<tr><td>Brak danych mapy</td></tr>');
            return;
        }

        var xCount = Object.keys(map_data.grid).length;
        var yCount = 0;
        if (xCount > 0) {
            var firstColumn = map_data.grid[Object.keys(map_data.grid)[0]];
            if (firstColumn) {
                yCount = Object.keys(firstColumn).length;
            }
        }

        generateGrid(xCount, yCount, map_data);
        fillAxisLabels(map_data);
        $('input[name=min_x]').val(map_data.min_x || '0');
        $('input[name=min_y]').val(map_data.min_y || '0');
    }

    $(document).on('keydown', function(e) {
        switch (e.key) {
            case 'ArrowLeft':
            case 'a':
            case 'A':
                TWMap.scrollBlock(-1, 0);
                break;
            case 'ArrowRight':
            case 'd':
            case 'D':
                TWMap.scrollBlock(1, 0);
                break;
            case 'ArrowUp':
            case 'w':
            case 'W':
                TWMap.scrollBlock(0, -1);
                break;
            case 'ArrowDown':
            case 's':
            case 'S':
                TWMap.scrollBlock(0, 1);
                break;
            default:
                return;
        }
        e.preventDefault();
    });

    $(function() { initializeMap(); });
</script>
{% endblock %}
